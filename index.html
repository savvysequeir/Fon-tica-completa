<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonética | VOWELS & CONSONANTS</title>
  <style>
    body{font-family:sans-serif;background:#eff6ff;padding:20px;text-align:center;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;max-width:800px;margin:auto;}
    a{padding:20px;background:#1d4ed8;color:white;text-decoration:none;border-radius:10px;font-weight:bold;}
  </style>
</head>
<body>
  <h1>Fonética Inglesa</h1>
  <div class="grid">
    <a href="VOWELS/vocal_a_laberinto.html">Vocal 1 /ɑː/</a>
  </div>
  <script>
    // Script de seguridad para redirigir nombres
    window.addEventListener('load', function() {
      if(localStorage.getItem('fonetica_student_full_name')) {
        var data = localStorage.getItem('fonetica_student_full_name');
        document.querySelectorAll('a').forEach(function(a){
          var u = new URL(a.href);
          u.searchParams.set('student', data);
          a.href = u.href;
        });
      }
    });
  </script>
</body>
</html>
