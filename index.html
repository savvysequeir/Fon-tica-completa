<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonética | VOWELS & CONSONANTS</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#eff6ff;padding:22px;color:#0f172a;}
    .wrap{max-width:1040px;margin:auto;background:white;border-radius:24px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,.1);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px;}
    a.btn-activity{display:block;background:#1d4ed8;color:white;text-decoration:none;padding:20px;border-radius:15px;font-weight:900;text-align:center;}
    a.btn-activity.con{background:#7c2d12}
    
    /* Portal de Registro */
    #studentNameGate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(15,23,42,.95);}
    #studentNameGate.gate-closed{display:none!important}
    .gate-card{width:min(720px,100%);background:#fff;border-radius:30px;padding:38px;box-shadow:0 35px 90px rgba(0,0,0,.38);}
    .gate-row{display:flex;gap:12px;flex-direction:column;margin-top:20px}
    .gate-row input, .gate-row select{width:100%;border:2px solid #cbd5e1;border-radius:16px;padding:15px;font-size:1rem;}
    .gate-row button{border:0;border-radius:16px;background:#16a34a;color:#fff;padding:15px;cursor:pointer;font-weight:950;}
  </style>
</head>
<body>

<!-- PORTAL DE REGISTRO -->
<div id="studentNameGate">
  <div class="gate-card">
    <h1>🧾 Identificación Académica</h1>
    <div class="gate-row">
      <input id="gateName" type="text" placeholder="Nombre y Apellidos Completos" />
      <select id="gateCareer">
        <option value="">-- Seleccionar Carrera --</option>
        <option value="Odontologia">Odontología</option>
        <option value="Medicina">Medicina</option>
        <option value="Veterinaria">Veterinaria</option>
        <option value="Agronomia">Agronomía</option>
        <option value="Otra">Otra</option>
      </select>
      <select id="gateYear">
        <option value="">-- Año Académico --</option>
        <option value="1">1er Año</option><option value="2">2do Año</option><option value="3">3er Año</option>
      </select>
      <button id="gateBtn">Guardar Datos Académicos</button>
    </div>
  </div>
</div>

<div class="wrap">
  <h1>Fonética · VOWELS & CONSONANTS</h1>
  <div id="activeStudentBanner" style="background:#dcfce7; padding:10px; border-radius:10px; margin-bottom:20px; display:none; font-weight:bold;"></div>
  
  <div class="grid">
    <a class="btn-activity" href="VOWELS/vocal_a_laberinto.html">Vocal 1 /ɑː/</a>
    <!-- Aquí irán tus otros enlaces -->
  </div>

  <div style="margin-top:40px; border-top: 2px dashed #cbd5e1; padding-top: 20px;">
    <h2>👩‍🏫 Portal del Docente</h2>
    <a href="docente.html" style="background:#0f172a; padding:15px; color:white; text-decoration:none; border-radius:10px; display:inline-block;">Abrir interfaz docente</a>
  </div>
</div>

<script>
  // Lógica del portal
  var gate = document.getElementById('studentNameGate');
  var banner = document.getElementById('activeStudentBanner');
  var saved = localStorage.getItem('fonetica_student_full_name');

  if(saved) {
    gate.classList.add('gate-closed');
    banner.style.display = 'block';
    banner.textContent = '✅ Estudiante: ' + saved.split('||')[0];
  }

  document.getElementById('gateBtn').onclick = function() {
    var n = document.getElementById('gateName').value;
    var c = document.getElementById('gateCareer').value;
    var y = document.getElementById('gateYear').value;
    if(n && c && y) {
      localStorage.setItem('fonetica_student_full_name', n + '||' + c + '||' + y);
      location.reload();
    } else {
      alert("Completa todos los campos");
    }
  };
</script>
</body>
</html>
