<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonética | VOWELS & CONSONANTS</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#eff6ff;padding:22px;color:#0f172a;}
    .wrap{max-width:1040px;margin:auto;background:white;border-radius:24px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,.1);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px;}
    a{display:block;background:#1d4ed8;color:white;text-decoration:none;padding:20px;border-radius:15px;font-weight:900;text-align:center;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Fonética Inglesa</h1>
    <div class="grid">
      <a href="VOWELS/vocal_a_laberinto.html">Vocal 1 /ɑː/</a>
    </div>
    <div id="studentStatus" style="margin-top:20px; font-weight:bold; color:#0f766e;"></div>
  </div>

  <script>
    // Recuperar nombre y mostrarlo
    window.addEventListener('load', function() {
      var data = localStorage.getItem('fonetica_student_full_name');
      if(data) {
        var nombre = data.split('||')[0].trim();
        document.getElementById('studentStatus').textContent = "Estudiante activo: " + nombre;
      }
    });
  </script>
</body>
</html>
