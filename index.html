<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonética | VOWELS & CONSONANTS</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#eff6ff;color:#0f172a;margin:0;padding:22px}
  .wrap{max-width:1040px;margin:auto;background:white;border:1px solid #dbe4ef;border-radius:24px;padding:24px;box-shadow:0 16px 40px rgba(15,23,42,.12)}
  h1{margin-top:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px;margin-top:18px}
  a{display:block;text-decoration:none;background:#1d4ed8;color:white;border-radius:18px;padding:18px;font-weight:900;box-shadow:0 10px 24px rgba(29,78,216,.25)}
  a.con{background:#7c2d12}a small{display:block;color:#dbeafe;margin-top:6px;font-weight:700}
  .note{background:#ecfeff;border:1px solid #a5f3fc;color:#164e63;border-radius:16px;padding:14px;margin-top:18px;font-weight:700}
  h2{margin-top:26px}
</style>
<style id="student-gate-style">
  #studentNameGate{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,rgba(15,23,42,.96),rgba(30,64,175,.94),rgba(15,118,110,.92));color:#0f172a}
  #studentNameGate.gate-closed{display:none!important}
  #studentNameGate .gate-card{width:min(720px,100%);background:#fff;border-radius:30px;padding:38px;box-shadow:0 35px 90px rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.6)}
  #studentNameGate .gate-row{display:flex;gap:12px;flex-direction:column;margin-top:20px}
  #studentNameGate input, #studentNameGate select{width:100%;border:2px solid #cbd5e1;border-radius:16px;padding:15px;font-size:1.05rem}
  #studentNameGate button{width:100%;background:#16a34a;color:#fff;font-weight:950;padding:15px;cursor:pointer;border-radius:16px;border:0;font-size:1.05rem}
</style>
</head>
<body>
<div id="studentNameGate">
  <div class="gate-card">
    <h1>Identificación de Estudiantes</h1>
    <div class="gate-row">
      <input id="gateStudentFullName" type="text" placeholder="Nombre y Apellidos Completos" />
      <select id="gateStudentCareer">
        <option value="">-- Carrera --</option>
        <option value="Odontologia">Odontología</option><option value="Medicina">Medicina</option>
        <option value="Quimica Farmaceutica">Química Farmacéutica</option><option value="Enfermeria">Enfermería</option>
        <option value="Mecanica Dental">Mecánica Dental</option><option value="Veterinaria">Veterinaria</option>
        <option value="Agricola">Agrícola</option><option value="Agronomia">Agronomía</option>
        <option value="Ingenieria Forestal">Ingeniería Forestal</option><option value="Agronegocios">Agronegocios</option>
        <option value="Zootecnia">Zootecnia</option><option value="Agroindustria de los Alimentos">Agroindustria de los Alimentos</option>
        <option value="Ingles">Inglés</option>
      </select>
      <select id="gateStudentYear">
        <option value="">-- Año Académico --</option>
        <option value="1">1er Año</option><option value="2">2do Año</option><option value="3">3er Año</option>
        <option value="4">4to Año</option><option value="5">5to Año</option>
      </select>
      <button id="gateContinueBtn">Guardar Datos Académicos</button>
    </div>
    <div id="gateNameError" style="color:#991b1b; margin-top:10px; font-weight:bold;"></div>
  </div>
</div>

<div class="wrap">
  <h1>Fonética · VOWELS & CONSONANTS</h1>
  <div class="grid">
    <a href="VOWELS/vocal_a_laberinto.html">Vocal 1 /ɑː/</a>
  </div>
</div>

<script>
(function(){
  var gate=document.getElementById('studentNameGate');
  var input=document.getElementById('gateStudentFullName');
  var career=document.getElementById('gateStudentCareer');
  var year=document.getElementById('gateStudentYear');
  var btn=document.getElementById('gateContinueBtn');

  btn.addEventListener('click', function(){
    if(!input.value.trim() || !career.value || !year.value) {
      document.getElementById('gateNameError').textContent = "Por favor completa todos los campos.";
      return;
    }
    var token = input.value.trim() + "||" + career.value + "||" + year.value;
    localStorage.setItem('fonetica_student_full_name', token);
    gate.classList.add('gate-closed');
    updateLinks();
  });

  window.updateLinks = function(){
    var data = localStorage.getItem('fonetica_student_full_name');
    if(!data) return;
    document.querySelectorAll('a[href$=".html"]').forEach(function(a){
      var u = new URL(a.getAttribute('href'), window.location.href);
      u.searchParams.set('student', data);
      a.setAttribute('href', u.href);
    });
  }
})();
</script>
</body>
</html>
