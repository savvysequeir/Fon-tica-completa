<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amina · Plan didáctico semestral</title><style>
:root{--blue:#155eef;--ink:#17243b;--muted:#667085;--line:#cbd5e1;--bg:#f3f6fb}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--ink)}header{background:linear-gradient(120deg,#102a56,#155eef);color:#fff;padding:25px max(20px,calc((100% - 1500px)/2));display:flex;justify-content:space-between;align-items:center;gap:15px}h1{margin:0 0 4px;font-size:30px}header p{margin:0;color:#dce8ff}.wrap{max-width:1500px;margin:22px auto;padding:0 16px}.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 12px 32px #17243b12}.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}label{font-size:12px;font-weight:700;display:block;margin-bottom:5px}input,select{width:100%;padding:10px;border:1px solid #aab6c7;border-radius:9px;font:inherit}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:15px}.btn{border:0;border-radius:9px;padding:11px 15px;background:var(--blue);color:#fff;font-weight:750;cursor:pointer;text-decoration:none}.btn.secondary{background:#eaf1ff;color:var(--blue)}.sheet-wrap{overflow:auto}.sheet{min-width:1450px;background:#fff;border:1px solid #475467;padding:22px}.heading{text-align:center;margin-bottom:15px}.heading h2{margin:0}.info{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:13px;font-size:11px}.info div{border-bottom:1px solid #667085;padding:6px}.matrix{width:100%;border-collapse:collapse;font-size:8.5px;table-layout:fixed}.matrix th,.matrix td{border:1px solid #344054;padding:6px;vertical-align:top;line-height:1.35}.matrix th{background:#dbe8f6;text-align:center}.n{width:38px}.date{width:68px}.med{width:120px}.wide{width:190px}.empty{text-align:center;padding:25px!important;color:var(--muted)}.notice{padding:12px;background:#fffaeb;border-left:4px solid #f59e0b;border-radius:7px;margin-bottom:15px}.status{color:#087e5b;margin-top:10px;font-size:13px}@media(max-width:850px){.controls{grid-template-columns:1fr 1fr}header{align-items:flex-start;flex-direction:column}}@media print{@page{size:landscape;margin:7mm}header,.panel,.actions{display:none!important}body,.wrap{background:#fff;margin:0;padding:0}.sheet-wrap{overflow:visible}.sheet{min-width:0;width:100%;border:0;padding:0}.matrix{font-size:6.3px}}
</style></head><body><header><div><h1>Plan didáctico semestral</h1><p>Modelo institucional · Bendiciones y Victorias</p></div><a class="btn secondary" href="index.html">← Volver al planificador</a></header><div class="wrap"><section class="panel"><div class="notice">Esta página reúne automáticamente los planes guardados en la página principal. Selecciona la carpeta de la carrera.</div><div class="controls"><div><label>Carrera</label><select id="career"><option>Odontología</option><option>Farmacia</option><option>Enfermería</option><option>Medicina</option></select></div><div><label>Semestre</label><select id="semester"><option>I semestre</option><option>II semestre</option></select></div><div><label>Grupo</label><input id="group" value="A"></div><div><label>Turno / modalidad</label><input id="shift" value="Matutino"></div><div><label>Año académico</label><input id="year" value="I"></div><div><label>Universidad</label><input id="university"></div><div><label>Docente</label><input id="teacher"></div><div><label>Asignatura</label><input id="subject" value="Inglés Comunicativo"></div></div><div class="actions"><button class="btn" onclick="render()">Actualizar matriz</button><button class="btn secondary" onclick="saveMeta()">Guardar datos generales</button><button class="btn" onclick="window.print()">Descargar / imprimir PDF</button><a class="btn secondary" href="documentos/Plan_Didactico_I_A.docx">Abrir modelo original</a></div><div id="status" class="status"></div></section><section class="panel sheet-wrap"><div id="sheet"></div></section></div><script>
const $=id=>document.getElementById(id),folders=['Odontología','Farmacia','Enfermería','Medicina'];function esc(s){return String(s||'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}function archive(){try{return JSON.parse(localStorage.getItem('planArchive')||'[]')}catch{return[]}}function saveMeta(){let m={};['career','semester','group','shift','year','university','teacher','subject'].forEach(id=>m[id]=$(id).value);localStorage.setItem('didacticMeta',JSON.stringify(m));$('status').textContent='Datos generales del plan didáctico guardados.';render()}function loadMeta(){try{let m=JSON.parse(localStorage.getItem('didacticMeta')||'{}');Object.entries(m).forEach(([id,v])=>{if($(id))$(id).value=v})}catch{}}
function exportsList(){try{return JSON.parse(localStorage.getItem('didacticExports')||'[]')}catch{return[]}}function render(){let career=$('career').value,ids=exportsList(),plans=archive().filter(p=>p.career===career&&ids.includes(p.id)).sort((a,b)=>a.number-b.number),rows=plans.map(p=>{let s=p.snapshot||{};return `<tr><td class="n">${p.number}</td><td class="date">${p.date}</td><td class="med">${esc(s.unidad)}</td><td class="med">${esc(s.tema)}</td><td class="wide">${esc(s.vinculacion)}</td><td class="med">${esc(s.objC)}</td><td class="med">${esc(s.objP)}</td><td class="med">${esc(s.objA)}</td><td class="med">${esc(s.inicio)}</td><td class="med">${esc(s.skill1)}</td><td class="med">${esc(s.skill2)}</td><td class="med">${esc(s.skill3)}</td><td class="med">${esc(s.skill4)}</td><td class="med">${esc(s.skill5)}</td><td class="med">${esc(s.cierre)}</td><td class="med">${esc(s.forma)}</td><td class="med">${esc(s.estrategia)}</td></tr>`}).join('');$('sheet').innerHTML=`<div class="sheet" style="min-width:2350px"><div class="heading"><h2>PLAN DIDÁCTICO ${$('semester').value.toUpperCase()}</h2><b>${esc($('university').value||'Universidad')}</b></div><div class="info"><div><b>Docente:</b> ${esc($('teacher').value)}</div><div><b>Carrera:</b> ${career}</div><div><b>Asignatura:</b> ${esc($('subject').value)}</div><div><b>Grupo:</b> ${esc($('group').value)}</div><div><b>Turno/modalidad:</b> ${esc($('shift').value)}</div><div><b>Año académico:</b> ${esc($('year').value)}</div><div><b>Semestre:</b> ${$('semester').value}</div></div><table class="matrix"><thead><tr><th rowspan="2" class="n">SESIÓN</th><th rowspan="2" class="date">FECHA</th><th rowspan="2" class="med">UNIDAD</th><th rowspan="2" class="med">TEMAS (CONTENIDO)</th><th rowspan="2" class="wide">VINCULACIÓN ENE · BENDICIONES Y VICTORIAS</th><th rowspan="2" class="med">OBJETIVO CONCEPTUAL</th><th rowspan="2" class="med">OBJETIVO PROCEDIMENTAL</th><th rowspan="2" class="med">OBJETIVO ACTITUDINAL</th><th colspan="7">ESTRATEGIAS DE ENSEÑANZA-APRENDIZAJE</th><th rowspan="2" class="med">EVALUACIÓN · FORMA</th><th rowspan="2" class="med">EVALUACIÓN · ESTRATEGIA</th></tr><tr><th class="med">PRESENTACIÓN</th><th class="med">H1 · PRONUNCIACIÓN</th><th class="med">H2 · GRAMÁTICA</th><th class="med">H3 · LECTURA</th><th class="med">H4 · ESCRITURA</th><th class="med">H5 · ESCUCHA</th><th class="med">H6 · HABLA</th></tr></thead><tbody>${rows||'<tr><td class="empty" colspan="17">No hay sesiones exportadas para esta carrera. Regresa al planificador y pulsa “Exportar al plan didáctico”.</td></tr>'}</tbody></table></div>`;$('status').textContent=`${plans.length} sesión${plans.length===1?'':'es'} exportada${plans.length===1?'':'s'} desde el planificador para ${career}.`}
function getEdits(){try{return JSON.parse(localStorage.getItem('didacticCellEdits')||'{}')}catch{return{}}}function getManualRows(){try{return JSON.parse(localStorage.getItem('didacticManualRows')||'[]')}catch{return[]}}function cell(row,key,value,cls='med'){let edits=getEdits(),v=edits[row.id]?.[key]??value??'';return `<td class="${cls}" contenteditable="true" data-row="${row.id}" data-key="${key}">${esc(v)}</td>`}function editableRows(){let career=$('career').value,ids=exportsList(),exported=archive().filter(p=>p.career===career&&ids.includes(p.id)),manual=getManualRows().filter(p=>p.career===career);return [...exported,...manual].sort((a,b)=>(a.number||0)-(b.number||0))}
function renderEditable(){let career=$('career').value,plans=editableRows(),rows=plans.map(p=>{let s=p.snapshot||{};return `<tr>${cell(p,'number',p.number,'n')}${cell(p,'date',p.date,'date')}${cell(p,'unidad',s.unidad)}${cell(p,'tema',s.tema)}${cell(p,'vinculacion',s.vinculacion,'wide')}${cell(p,'objC',s.objC)}${cell(p,'objP',s.objP)}${cell(p,'objA',s.objA)}${cell(p,'inicio',s.inicio)}${cell(p,'skill1',s.skill1)}${cell(p,'skill2',s.skill2)}${cell(p,'skill3',s.skill3)}${cell(p,'skill4',s.skill4)}${cell(p,'skill5',s.skill5)}${cell(p,'cierre',s.cierre)}${cell(p,'forma',s.forma)}${cell(p,'estrategia',s.estrategia)}</tr>`}).join('');$('sheet').innerHTML=`<div class="sheet" style="min-width:2350px"><div class="heading"><h2>PLAN DIDÁCTICO ${$('semester').value.toUpperCase()}</h2><b>${esc($('university').value||'Universidad')}</b></div><div class="info"><div><b>Docente:</b> ${esc($('teacher').value)}</div><div><b>Carrera:</b> ${career}</div><div><b>Asignatura:</b> ${esc($('subject').value)}</div><div><b>Grupo:</b> ${esc($('group').value)}</div><div><b>Turno/modalidad:</b> ${esc($('shift').value)}</div><div><b>Año académico:</b> ${esc($('year').value)}</div><div><b>Semestre:</b> ${$('semester').value}</div></div><table class="matrix"><thead><tr><th rowspan="2" class="n">SESIÓN</th><th rowspan="2" class="date">FECHA</th><th rowspan="2" class="med">UNIDAD</th><th rowspan="2" class="med">TEMAS (CONTENIDO)</th><th rowspan="2" class="wide">VINCULACIÓN ENE · BENDICIONES Y VICTORIAS</th><th rowspan="2" class="med">OBJETIVO CONCEPTUAL</th><th rowspan="2" class="med">OBJETIVO PROCEDIMENTAL</th><th rowspan="2" class="med">OBJETIVO ACTITUDINAL</th><th colspan="7">ESTRATEGIAS DE ENSEÑANZA-APRENDIZAJE</th><th rowspan="2" class="med">EVALUACIÓN · FORMA</th><th rowspan="2" class="med">EVALUACIÓN · ESTRATEGIA</th></tr><tr><th class="med">PRESENTACIÓN</th><th class="med">H1 · PRONUNCIACIÓN</th><th class="med">H2 · GRAMÁTICA</th><th class="med">H3 · LECTURA</th><th class="med">H4 · ESCRITURA</th><th class="med">H5 · ESCUCHA</th><th class="med">H6 · HABLA</th></tr></thead><tbody>${rows||'<tr><td class="empty" colspan="17">Pulsa “Nueva sesión editable” o exporta una sesión desde el planificador.</td></tr>'}</tbody></table></div>`;$('status').textContent=`${plans.length} sesión${plans.length===1?'':'es'} disponible${plans.length===1?'':'s'} para editar. Haz clic dentro de cualquier celda.`}
function saveMatrixEdits(){let edits=getEdits();document.querySelectorAll('[data-row][data-key]').forEach(td=>{edits[td.dataset.row]??={};edits[td.dataset.row][td.dataset.key]=td.innerText??td.textContent});localStorage.setItem('didacticCellEdits',JSON.stringify(edits));$('status').textContent='Todos los cambios de la matriz fueron guardados.'}function addManualSession(){let rows=getManualRows(),career=$('career').value,numbers=editableRows().map(x=>Number(x.number)||0),number=Math.max(0,...numbers)+1,d=new Date(),date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;rows.push({id:`manual-${Date.now()}`,number,date,career,snapshot:{}});localStorage.setItem('didacticManualRows',JSON.stringify(rows));render();$('status').textContent=`Nueva sesión ${number} creada. Escribe directamente debajo de cada encabezado.`}
function configureInstitution(){document.querySelector('header div').insertAdjacentHTML('afterbegin','<img class="uni-logo" src="documentos/logo_unijjar.jpeg" alt="Logo Universidad Jean-Jacques Rousseau">');$('group').outerHTML='<select id="group"><option>A</option><option>B</option><option>Único</option></select>';$('shift').outerHTML='<select id="shift"><option>Sabatino</option><option>Matutino</option></select>';$('year').outerHTML='<select id="year"><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select>';$('subject').outerHTML='<select id="subject"><option>A1</option><option>A2</option><option>A2+</option></select>'}
function deleteDidacticSession(id){let row=editableRows().find(x=>x.id===id);if(!row||!confirm(`¿Borrar la sesión ${row.number} del plan didáctico?`))return;if(id.startsWith('manual-'))localStorage.setItem('didacticManualRows',JSON.stringify(getManualRows().filter(x=>x.id!==id)));else localStorage.setItem('didacticExports',JSON.stringify(exportsList().filter(x=>x!==id)));let edits=getEdits();delete edits[id];localStorage.setItem('didacticCellEdits',JSON.stringify(edits));render();$('status').textContent=`Sesión ${row.number} borrada del plan didáctico.`}
const editableBase=renderEditable;function renderWithActions(){editableBase();let first=$('sheet').querySelector('.matrix thead tr');if(first){let th=document.createElement('th');th.rowSpan=2;th.textContent='ACCIONES';th.className='date';first.appendChild(th)}let rows=editableRows();[...$('sheet').querySelectorAll('.matrix tbody tr')].forEach((tr,i)=>{if(!rows[i])return;let td=document.createElement('td');td.innerHTML=`<button class="delete-session" onclick="deleteDidacticSession('${rows[i].id}')">Borrar sesión</button>`;tr.appendChild(td)})}
document.head.insertAdjacentHTML('beforeend','<style>.uni-logo{width:78px;height:78px;object-fit:contain;float:left;margin-right:14px;background:#fff;border-radius:10px;padding:4px}.matrix td[contenteditable="true"]{background:#fffef5;outline:none;min-height:55px}.matrix td[contenteditable="true"]:hover{background:#fff8d8;box-shadow:inset 0 0 0 2px #f5c451}.matrix td[contenteditable="true"]:focus{background:#fff3b5;box-shadow:inset 0 0 0 2px #155eef}.matrix td[contenteditable="true"]:empty:before{content:"Escribe aquí…";color:#98a2b3;font-style:italic}.delete-session{border:0;border-radius:7px;padding:7px;background:#fee4e2;color:#b42318;font-weight:700;cursor:pointer}@media print{.matrix td[contenteditable="true"]{background:#fff!important;box-shadow:none!important}.matrix td[contenteditable="true"]:empty:before{content:""}.delete-session,.matrix th:last-child,.matrix td:last-child{display:none}}</style>');configureInstitution();render=renderWithActions;let actions=document.querySelector('.actions');actions.insertAdjacentHTML('beforeend','<button class="btn" onclick="addManualSession()">Nueva sesión editable</button><button class="btn secondary" onclick="saveMatrixEdits()">Guardar cambios de la matriz</button>');loadMeta();$('university').value='Jean-Jacques Rousseau';$('teacher').value='Lic. Wascar Enrique Sequeira Hurtado';document.querySelectorAll('input,select').forEach(x=>x.addEventListener('change',render));render();
</script></body></html>
