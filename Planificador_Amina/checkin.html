<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UNIJJAR · Registrar asistencia</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#edf6ef;font-family:Segoe UI,Arial;color:#173323;padding:18px}.card{width:min(480px,100%);background:#fff;border:1px solid #9fc0a8;border-radius:18px;padding:28px;text-align:center;box-shadow:0 16px 45px #17332322}.logo{width:92px;height:92px;object-fit:contain}h1{font-size:23px}.icon{font-size:58px}.ok{color:#176a3a}.error{color:#b42318}.wait{color:#725b00}.time{font-size:20px;font-weight:800}.retry{border:0;border-radius:9px;padding:11px 16px;background:#176a3a;color:#fff;font-weight:800;cursor:pointer}</style></head><body><main class="card"><img class="logo" src="documentos/logo_unijjar.jpeg" alt="UNIJJAR"><h1>Registro de asistencia</h1><div id="result"><div class="icon">⏳</div><p>Verificando su QR…</p></div></main><script>
const result=document.getElementById('result');let card=new URLSearchParams(location.search).get('card')||'';function requestCard(){result.innerHTML='<div class="icon">📱</div><h2>Confirmar asistencia</h2><p>Escriba su carnet y pulse Enviar asistencia.</p><input id="studentCard" style="width:100%;padding:13px;border:1px solid #9fc0a8;border-radius:9px;font-size:18px;text-align:center" placeholder="Ejemplo: 26-00077"><br><br><button class="retry" onclick="card=document.getElementById(\'studentCard\').value.trim();checkin()">Enviar asistencia</button>'}async function checkin(){if(!card)return requestCard();result.innerHTML='<div class="icon">⏳</div><p>Enviando asistencia…</p>';try{let r=await fetch('/api/attendance/checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({card})}),d=await r.json();if(!r.ok)throw new Error(d.error||'No se pudo registrar.');let time=new Date(d.record.at).toLocaleTimeString('es-NI',{hour:'2-digit',minute:'2-digit'});result.innerHTML=`<div class="icon">❤️</div><h2 class="ok">Asistencia registrada</h2><p><b>${d.record.name}</b></p><p>Carnet: ${d.record.card}</p><p class="time">🕒 ${time}</p><p>Ya puede cerrar esta página.</p>`}catch(e){show(false,'No se registró la asistencia',e.message);if(/todavía no ha iniciado/i.test(e.message))setTimeout(checkin,3000)}}function show(ok,title,text){result.innerHTML=`<div class="icon">${ok?'❤️':'⚠️'}</div><h2 class="${ok?'ok':'error'}">${title}</h2><p>${text}</p><button class="retry" onclick="checkin()">Intentar nuevamente</button>`}checkin();
</script></body></html>
