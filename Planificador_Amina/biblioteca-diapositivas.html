<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amina · Biblioteca de diapositivas</title><script src="slide-library.js"></script><style>
:root{--green:#0e5232;--accent:#177646;--pale:#e7f4ea;--line:#abc5b2;--ink:#153321;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:#edf4ef;color:var(--ink);font-family:Segoe UI,Arial,sans-serif}header{background:var(--green);color:#fff;padding:16px max(18px,calc((100% - 1400px)/2));display:flex;align-items:center;gap:12px}header h1{margin:0 auto 0 0}.btn{border:0;border-radius:9px;padding:10px 14px;background:var(--accent);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.btn.light{background:#e5f2e8;color:var(--green)}.btn.red{background:var(--red)}main{max-width:1400px;margin:22px auto;padding:0 16px}.tools{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:12px}.tools input{width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;font:inherit}.summary{margin:16px 0;font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:17px}.card{background:#fff;border:1px solid var(--line);border-radius:17px;overflow:hidden;box-shadow:0 8px 25px #17352212}.preview{position:relative;aspect-ratio:16/9;background:#0e5232;color:#fff;padding:28px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}.preview>div,.preview>svg{max-width:100%;max-height:100%}.preview img{max-width:42%;max-height:48%;object-fit:contain;position:absolute;right:18px;bottom:14px}.preview h2{font-size:24px;margin:0 0 10px}.preview p{white-space:pre-wrap;margin:0;max-height:90px;overflow:hidden}.info{padding:15px}.info h3{margin:0 0 7px}.meta{font-size:13px;color:#587063}.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.empty{text-align:center;background:#fff;border:1px dashed var(--line);border-radius:18px;padding:50px}.number{background:#dff3e5;color:var(--green);border-radius:999px;padding:3px 9px;font-weight:900}@media(max-width:650px){header{flex-wrap:wrap}header h1{width:100%}.tools{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style></head><body><header><a class="btn light" href="index.html">← Planificador</a><h1>Biblioteca de diapositivas</h1><a class="btn light" href="diapositivas.html">+ Crear presentación</a></header><main><section class="tools"><input id="search" placeholder="Buscar por nombre o contenido" oninput="render()"><button class="btn" onclick="render()">Buscar</button></section><div id="summary" class="summary"></div><section id="grid" class="grid"></section></main><script>
let records=[],nativeModule=null,previewViewers=[];const $=id=>document.getElementById(id),safe=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),date=v=>new Date(v).toLocaleString('es-NI',{dateStyle:'medium',timeStyle:'short'});
async function load(){try{records=await SlideLibrary.list();render()}catch(e){$('grid').innerHTML=`<div class="empty">No se pudo abrir la biblioteca: ${safe(e.message)}</div>`}}
function render(){let q=$('search').value.trim().toLowerCase(),shown=records.filter(r=>!q||r.title.toLowerCase().includes(q)||JSON.stringify(r.deck?.slides||[]).toLowerCase().includes(q));$('summary').innerHTML=`<span class="number">${shown.length}</span> presentación(es) guardada(s)`;$('grid').innerHTML=shown.length?shown.map((r,i)=>{let first=r.deck?.slides?.[0]||{},n=r.deck?.slides?.length||0;return`<article class="card"><div class="preview" id="preview-${r.id}" style="background:${safe(first.bg||'#0e5232')};color:${safe(first.color||'#ffffff')}">${r.originalBytes?'<p>Cargando vista original…</p>':`<h2>${safe(first.title||r.title)}</h2><p>${safe(first.body||'')}</p>${first.visualSnapshot||`${first.image?`<img src="${first.image}" alt="Imagen de portada">`:''}`}`}</div><div class="info"><h3>${safe(r.title)}</h3><div class="meta">N.º ${records.indexOf(r)+1} · ${n} diapositiva(s)<br>Actualizada: ${date(r.updatedAt)}${r.originalBytes?' · PowerPoint original conservado':''}</div><div class="actions"><button class="btn" onclick="openDeck('${r.id}')">Abrir y editar</button><button class="btn light" onclick="copyDeck('${r.id}')">Duplicar</button><button class="btn red" onclick="removeDeck('${r.id}')">Borrar</button></div></div></article>`}).join(''):'<div class="empty"><h2>No hay presentaciones guardadas</h2><p>Abra el creador, prepare una presentación y pulse “Guardar en biblioteca”.</p><a class="btn" href="diapositivas.html">Crear la primera</a></div>';renderRealPreviews(shown)}
async function renderRealPreviews(shown){previewViewers.forEach(v=>v.destroy?.());previewViewers=[];let imported=shown.filter(r=>r.originalBytes);if(!imported.length)return;try{nativeModule=nativeModule||await import('./pptx-renderer.browser.es.js');for(let record of imported){let el=$('preview-'+record.id);if(!el)continue;el.innerHTML='';let files=await nativeModule.parseZip(record.originalBytes,nativeModule.RECOMMENDED_ZIP_LIMITS),presentation=nativeModule.buildPresentation(files),viewer=new nativeModule.PptxViewer(el,{fitMode:'none'});viewer.load(presentation);viewer.renderThumbnailToContainer(0,el,{width:320});previewViewers.push(viewer)}}catch(e){console.warn('Vista original no disponible',e);shown.forEach(record=>{let el=$('preview-'+record.id),first=record.deck?.slides?.[0];if(el&&first?.visualSnapshot)el.innerHTML=first.visualSnapshot})}}function openDeck(id){location.href='diapositivas.html?library='+encodeURIComponent(id)}async function copyDeck(id){await SlideLibrary.duplicate(id);await load()}async function removeDeck(id){let r=records.find(x=>x.id===id);if(!confirm(`¿Borrar “${r?.title||'esta presentación'}” de la biblioteca?`))return;await SlideLibrary.remove(id);await load()}load();
</script></body></html>
