<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Consulta de notas · UNIJJAR</title>
  <style>
    :root{--green:#0b3b2b;--accent:#167746;--pale:#eaf5ee;--line:#b9d0c1;--red:#b42318}
    *{box-sizing:border-box}body{margin:0;background:#eef4ef;color:#102b20;font:17px system-ui,-apple-system,Segoe UI,sans-serif}
    main{max-width:900px;margin:auto;padding:24px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:0 10px 30px #143f2515}
    .brand{text-align:center}.brand img{width:105px;height:105px;object-fit:contain}.brand h1{margin:8px 0 2px;color:var(--green)}.brand p{margin:4px}
    .query{display:flex;gap:10px;max-width:620px;margin:24px auto}.query input{flex:1;min-width:0;padding:15px;border:2px solid var(--line);border-radius:12px;text-transform:uppercase;font-size:20px;letter-spacing:3px}.query button{border:0;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;padding:0 22px;cursor:pointer}
    #status{text-align:center;min-height:28px;color:var(--red);font-weight:700}.identity{background:var(--green);color:#fff;border-radius:16px;padding:20px;margin-top:18px}.identity h2{margin:0 0 6px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:var(--pale);border:1px solid var(--line);border-radius:15px;padding:15px;text-align:center}.metric b{display:block;font-size:26px;color:var(--accent)}
    .partial{margin-top:18px;border:1px solid var(--line);border-radius:16px;overflow:hidden}.partial h3{margin:0;background:#dcecdf;padding:13px 17px}.partial table{width:100%;border-collapse:collapse}.partial th,.partial td{padding:11px;border-bottom:1px solid #dce7df;text-align:left}.partial th:last-child,.partial td:last-child{text-align:right}.total{font-weight:900;background:#f5faf6}.date{color:#52685d;font-size:14px}.interventions{margin-top:22px;border:2px solid #e5a000;background:#fff8df;border-radius:16px;padding:18px}.interventions h3{margin-top:0;color:#7a4b00}.intervention{background:#fff;border:1px solid #e8c66a;border-radius:12px;padding:13px;margin-top:10px}.intervention b{color:#7a4b00}.privacy{text-align:center;color:#52685d;font-size:14px;margin-top:18px}
    @media(max-width:640px){main{padding:10px}.card{padding:18px 12px}.query{flex-direction:column}.query button{padding:15px}.summary{grid-template-columns:repeat(2,1fr)}.partial{overflow:auto}.partial table{min-width:480px}.brand h1{font-size:27px}}
  </style>
</head>
<body><main><section class="card">
  <div class="brand"><img src="documentos/logo_unijjar.jpeg" alt="Logo UNIJJAR"><h1>Consulta de notas</h1><p>Universidad Jean-Jacques Rousseau</p><p>Ingrese el código privado entregado por su docente.</p></div>
  <div class="query"><input id="code" maxlength="12" autocomplete="off" placeholder="CÓDIGO" onkeydown="if(event.key==='Enter')lookup()"><button onclick="lookup()">Consultar mi nota</button></div>
  <div id="status"></div><div id="result"></div>
  <p class="privacy">El código muestra únicamente el registro individual asociado. No lo comparta con otras personas.</p>
</section></main>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const score=v=>v===''||v==null?'—':Number(v).toFixed(Number(v)%1?2:0),date=v=>v?new Date(v+'T12:00:00').toLocaleDateString('es-NI',{day:'2-digit',month:'short',year:'numeric'}):'Fecha no asignada';
async function lookup(){let code=$('code').value.trim().toUpperCase();$('result').innerHTML='';if(!code){$('status').textContent='Escriba el código proporcionado por el docente.';return}$('status').textContent='Consultando…';try{let res=await fetch('/api/grades/lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})}),data=await res.json();if(!res.ok)throw new Error(data.error||'No fue posible consultar la nota.');render(data.record);$('status').textContent=''}catch(e){$('status').textContent=e.message+(location.protocol==='file:'?' Abra esta página mediante INICIAR_PLANIFICADOR.bat.':'')}}
function render(r){let changes=r.modifications||[];$('result').innerHTML=`<div class="identity"><h2>${esc(r.name)}</h2><div>Carnet: <b>${esc(r.card)}</b></div><div>${esc(r.subject)} · ${esc(r.career)} · Grupo ${esc(r.group)} · ${esc(r.period)}</div></div><div class="summary">${r.partials.map(p=>`<div class="metric">${esc(p.title)}<b>${score(p.total)}</b></div>`).join('')}<div class="metric">Nota final<b>${score(r.final)}</b></div></div>${r.partials.map(p=>`<section class="partial"><h3>${esc(p.title)}</h3><table><thead><tr><th>Actividad</th><th>Fecha</th><th>Puntaje</th></tr></thead><tbody>${p.tests.map(t=>`<tr><td>${esc(t.label)} <small>(valor normal: ${score(t.max)})</small></td><td class="date">${date(t.date)}</td><td>${score(t.score)}</td></tr>`).join('')}<tr class="total"><td>Acumulado</td><td></td><td>${score(p.accumulated)}</td></tr><tr><td>${esc(p.exam.label)} <small>(valor normal: 50)</small></td><td class="date">${date(p.exam.date)}</td><td>${score(p.exam.score)}</td></tr><tr class="total"><td>Total del parcial</td><td></td><td>${score(p.total)} / 100</td></tr></tbody></table></section>`).join('')}${changes.length?`<section class="interventions"><h3>Intervenciones y modificaciones de notas</h3><p>Este registro informa las correcciones o valores excepcionales autorizados.</p>${changes.map(x=>`<div class="intervention"><b>${esc(x.assessment)}</b><div>Fecha de intervención: ${new Date(x.at).toLocaleString('es-NI')}</div><div>Nota anterior: ${x.before===''?'Sin nota':score(x.before)} · Nota nueva: <b>${score(x.after)}</b>${x.exceptional?` · Valor normal: ${score(x.normalMax)}`:''}</div><div>Motivo: <b>${esc(x.reason)}</b></div><div>Explicación: ${esc(x.detail)}</div></div>`).join('')}</section>`:'<section class="interventions"><h3>Sin modificaciones</h3><p>Las notas publicadas no tienen intervenciones registradas.</p></section>'}`}
</script><script type="module" src="firebase-sync.js"></script></body></html>
